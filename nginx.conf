server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Permite subir facturas (PDF/imagen) de hasta 15 MB a través del proxy
    client_max_body_size 15m;

    # SPA de Angular: cualquier ruta no encontrada cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de la API hacia el backend (mismo origen → sin CORS).
    # La barra final en proxy_pass elimina el prefijo /api: /api/documentos -> http://api:8080/documentos
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
